{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="bg-white border border-gray-200 p-8 rounded-xl shadow-sm w-full max-w-md">
    <div class="text-center mb-6">
      <h1 class="font-display text-2xl font-bold tracking-tight">fit<span class="text-accent">.</span><span class="text-faint font-medium">io</span></h1>
      <p class="text-sm text-muted mt-1">Create your account</p>
    </div>
    {% if error %}
    <div class="bg-warm-soft text-miss px-4 py-3 rounded-lg mb-4 text-sm">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
        <input type="text" name="display_name" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required minlength="6"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Timezone</label>
          <select name="timezone_str" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none">
            <option value="America/Toronto">America/Toronto</option>
            <option value="America/New_York">America/New_York</option>
            <option value="America/Chicago">America/Chicago</option>
            <option value="America/Denver">America/Denver</option>
            <option value="America/Los_Angeles">America/Los_Angeles</option>
            <option value="America/Vancouver">America/Vancouver</option>
            <option value="Europe/London">Europe/London</option>
            <option value="UTC">UTC</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Units</label>
          <select name="units_pref" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none">
            <option value="imperial">Imperial (lbs)</option>
            <option value="metric">Metric (kg)</option>
          </select>
        </div>
      </div>
      <button type="submit" class="w-full py-2.5 px-4 bg-accent text-white rounded-lg hover:bg-accent-press font-semibold text-sm transition-colors">
        Create Account
      </button>
    </form>
    <p class="text-center text-sm text-muted mt-4">
      Already have an account? <a href="/login" class="text-accent hover:text-accent-press font-medium">Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
