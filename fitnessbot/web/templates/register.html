{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-900 mb-6">Create Account</h1>
    {% if error %}
    <div class="bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
        <input type="text" name="display_name" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required minlength="6"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Timezone</label>
          <select name="timezone_str"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
            <option value="America/Toronto">America/Toronto</option>
            <option value="America/New_York">America/New_York</option>
            <option value="America/Chicago">America/Chicago</option>
            <option value="America/Denver">America/Denver</option>
            <option value="America/Los_Angeles">America/Los_Angeles</option>
            <option value="America/Vancouver">America/Vancouver</option>
            <option value="Europe/London">Europe/London</option>
            <option value="UTC">UTC</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Units</label>
          <select name="units_pref"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
            <option value="imperial">Imperial (lbs)</option>
            <option value="metric">Metric (kg)</option>
          </select>
        </div>
      </div>
      <button type="submit"
              class="w-full py-2 px-4 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">
        Create Account
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account? <a href="/login" class="text-brand-600 hover:text-brand-700 font-medium">Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
