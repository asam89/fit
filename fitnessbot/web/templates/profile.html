{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Profile</h1>
  {% if success %}
  <div class="bg-green-50 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm">{{ success }}</div>
  {% endif %}
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <form method="POST" action="/profile" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
        <input type="text" name="display_name" value="{{ user.display_name }}" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Timezone</label>
          <select name="timezone_str"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
            {% for tz in ['America/Toronto', 'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles', 'America/Vancouver', 'Europe/London', 'UTC'] %}
            <option value="{{ tz }}" {% if user.timezone == tz %}selected{% endif %}>{{ tz }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Units</label>
          <select name="units_pref"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
            <option value="imperial" {% if user.units_pref == 'imperial' %}selected{% endif %}>Imperial (lbs)</option>
            <option value="metric" {% if user.units_pref == 'metric' %}selected{% endif %}>Metric (kg)</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sex</label>
          <select name="sex"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
            <option value="">—</option>
            <option value="male" {% if user.sex == 'male' %}selected{% endif %}>Male</option>
            <option value="female" {% if user.sex == 'female' %}selected{% endif %}>Female</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Height ({{ "in" if user.units_pref == 'imperial' else "cm" }})</label>
          <input type="number" name="height" step="0.1" value="{{ user.height or '' }}"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Birthdate</label>
          <input type="date" name="birthdate" value="{{ user.birthdate or '' }}"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Activity Level</label>
        <select name="activity_level"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
          <option value="">—</option>
          <option value="sedentary" {% if user.activity_level == 'sedentary' %}selected{% endif %}>Sedentary</option>
          <option value="light" {% if user.activity_level == 'light' %}selected{% endif %}>Lightly Active</option>
          <option value="moderate" {% if user.activity_level == 'moderate' %}selected{% endif %}>Moderately Active</option>
          <option value="active" {% if user.activity_level == 'active' %}selected{% endif %}>Very Active</option>
          <option value="extreme" {% if user.activity_level == 'extreme' %}selected{% endif %}>Extremely Active</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Dietary Restrictions</label>
        <input type="text" name="dietary_restrictions" value="{{ user.dietary_restrictions or '' }}"
               placeholder="e.g. halal, vegetarian, gluten-free, nut allergy"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500">
      </div>
      <button type="submit"
              class="w-full py-2 px-4 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">
        Save Profile
      </button>
    </form>
  </div>
</div>
{% endblock %}
